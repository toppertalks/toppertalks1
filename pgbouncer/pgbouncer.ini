; ============================================================================
; PgBouncer — Production Configuration for TopperTalks (VPS / bare-metal)
;
; For Docker deployment use docker-compose.yml — the edoburu/pgbouncer image
; picks up all settings from environment variables and does not need this file.
;
; To use on a VPS:
;   1. Copy to /etc/pgbouncer/pgbouncer.ini
;   2. Generate the MD5 password hash (see userlist.txt.example):
;          printf "md5%s" "$(printf 'YOUR_PASSWORDpostgres' | md5sum | awk '{print $1}')"
;   3. Write the hash into /etc/pgbouncer/userlist.txt
;   4. systemctl restart pgbouncer
; ============================================================================

[databases]
; "toppertalks" is the alias your app uses in the connection string
; Replace 127.0.0.1 with the real Postgres host if it's on a different machine
toppertalks = host=127.0.0.1 port=5432 dbname=toppertalks

; ── Pooling ──────────────────────────────────────────────────────────────────
[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; Transaction pooling: a Postgres connection is held only for the duration
; of one transaction, then immediately returned to the pool.
; This is the only correct mode for stateless async frameworks like FastAPI.
pool_mode = transaction

; Actual server-side Postgres connections PgBouncer keeps open.
; Rule of thumb: set this to the number of CPU cores × 2–4 on Postgres host.
default_pool_size = 25

; Keep this many idle connections ready before demand arrives.
min_pool_size = 5

; Extra connections for clients that are waiting but cannot get a slot.
reserve_pool_size = 5

; How many seconds to wait before giving a client a reserve slot.
reserve_pool_timeout = 3

; Maximum client connections FastAPI (or any client) may open to PgBouncer.
; This is cheap — PgBouncer holds these in memory, not in Postgres.
max_client_conn = 1000

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_idle_timeout = 600     ; Drop idle server connections after 10 min
client_idle_timeout = 600     ; Drop idle client connections after 10 min
server_login_retry  = 15      ; Retry connecting to Postgres every 15 s
query_timeout       = 30      ; Kill queries running longer than 30 s

; ── Session cleanup ───────────────────────────────────────────────────────────
; DISCARD ALL resets session-level state (SET, temp tables, advisory locks)
; before a connection is handed back to the pool. Required for transaction mode.
server_reset_query = DISCARD ALL

; asyncpg sends `extra_float_digits` in the startup packet.
; PgBouncer doesn't know this parameter — tell it to silently ignore it.
ignore_startup_parameters = extra_float_digits

; ── Authentication ────────────────────────────────────────────────────────────
; MD5 is the most portable option. Use scram-sha-256 if your Postgres >= 14
; is configured with `password_encryption = scram-sha-256` in postgresql.conf.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Logging ──────────────────────────────────────────────────────────────────
logfile               = /var/log/pgbouncer/pgbouncer.log
pidfile               = /var/run/pgbouncer/pgbouncer.pid
log_connections       = 0   ; Suppress per-connection noise in production
log_disconnections    = 0
log_pooler_errors     = 1   ; Log errors that PgBouncer itself generates

; ── Admin interface ───────────────────────────────────────────────────────────
; psql -h 127.0.0.1 -p 6432 -U postgres pgbouncer
; Then run: SHOW POOLS; SHOW STATS; SHOW CLIENTS; SHOW SERVERS;
admin_users  = postgres
stats_users  = postgres
