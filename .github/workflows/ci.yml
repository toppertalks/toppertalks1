# =============================================================================
# TopperTalks — CI/CD Pipeline
#
# Triggers: every push to main or any pull request targeting main.
#
# Jobs:
#   1. lint   — fail fast on syntax/import errors before running tests
#   2. test   — run pytest with a live Postgres + Redis (via service containers)
#   3. build  — build & push Docker image to GHCR (only on push to main)
#   4. deploy — SSH into the VPS and do a zero-downtime rolling restart
#               (only on push to main, after build succeeds)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   POSTGRES_PASSWORD   any strong password for the test DB
#   FIREBASE_PROJECT_ID your Firebase project ID
#   DEPLOY_HOST         IP / hostname of your production VPS
#   DEPLOY_USER         SSH user on the VPS (e.g. ubuntu)
#   DEPLOY_SSH_KEY      private SSH key (the VPS must have the public key)
# =============================================================================

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/toppertalks-backend

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.7

      - name: Run ruff
        run: ruff check backend/

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: toppertalks_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/toppertalks_test
      REDIS_URL: redis://localhost:6379/0
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

  # ── 3. Build & Push Docker image ──────────────────────────────────────────
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    needs: test
    # Only build on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          # Tag with git SHA (immutable) AND "latest" (for convenience)
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Cache layers between runs to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production   # requires manual approval if configured in GitHub

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/toppertalks

            # Pull the specific image built in this pipeline run
            docker pull ${{ env.IMAGE }}:${{ github.sha }}

            # ------------------------------------------------------------------
            # Zero-downtime rolling restart:
            #   1. Start new container with the new image BEFORE stopping old one.
            #   2. Wait for its /health to return 200.
            #   3. Switch traffic (docker compose re-creates only the backend).
            # docker compose up --no-deps scales down old then up new safely.
            # ------------------------------------------------------------------
            IMAGE_TAG=${{ github.sha }} docker compose pull backend
            docker compose up -d --no-deps --build backend

            # Run Alembic migrations inside the new container AFTER it starts.
            # Migrations run before requests are routed to the new instance.
            docker compose exec -T backend alembic upgrade head

            # Clean up old images to reclaim disk space
            docker image prune -f
